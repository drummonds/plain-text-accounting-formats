name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Clone sibling grammar repos
        run: |
          git clone --depth 1 https://github.com/polarmutex/tree-sitter-beancount ../tree-sitter-beancount
          git clone --depth 1 https://github.com/drummonds/tree-sitter-goluca ../tree-sitter-goluca
          git clone --depth 1 https://github.com/drummonds/tree-sitter-pta ../tree-sitter-pta

      - name: Install tools
        run: |
          go install github.com/drummonds/tree-sitter2abnf@latest
          go install github.com/drummonds/pta2svg@latest

      - name: Build docs
        run: go run ./cmd/docs

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
