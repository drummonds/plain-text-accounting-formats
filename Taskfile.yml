version: "3"

tasks:
  fmt:
    desc: Format Go source files
    cmds:
      - go fmt ./...

  vet:
    desc: Run Go vet
    cmds:
      - go vet ./...

  test:
    desc: Run tests
    cmds:
      - go test ./... -count=1

  check:
    desc: Run fmt, vet, and test
    cmds:
      - task: fmt
      - task: vet
      - task: test

  deps:tidy:
    desc: Tidy Go modules
    cmds:
      - go mod tidy

  clean:
    desc: Remove build artifacts
    cmds:
      - go clean ./...

  build:
    desc: Build the CLI
    cmds:
      - go build -o bin/gts-beancount ./cmd/gts-beancount

  demo:
    desc: Run all CLI subcommands against test data
    deps: [build]
    cmds:
      - echo "=== parse ===" && bin/gts-beancount parse testdata/simple.beancount
      - echo "=== highlight ===" && bin/gts-beancount highlight testdata/simple.beancount
      - echo "=== check ===" && bin/gts-beancount check testdata/simple.beancount

  docs:build:
    desc: Generate HTML docs from testdata
    cmds:
      - go run ./cmd/docs

  docs:serve:
    desc: Build docs and serve locally
    deps: [docs:build]
    cmds:
      - task-plus pages --dir docs

