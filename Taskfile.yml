version: "3"

tasks:
  fmt:
    desc: Format Go source files
    cmds:
      - go fmt ./...

  vet:
    desc: Run Go vet
    cmds:
      - go vet ./...

  test:
    desc: Run tests
    cmds:
      - go test ./... -count=1

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  check:
    desc: Run fmt, vet, lint, and test
    cmds:
      - task: fmt
      - task: vet
      - task: lint
      - task: test

  deps:tidy:
    desc: Tidy Go modules
    cmds:
      - go mod tidy

  clean:
    desc: Remove build artifacts
    cmds:
      - go clean ./...

  build:
    desc: Build the CLI
    cmds:
      - go build -o bin/ptaf ./cmd/ptaf

  demo:
    desc: Run all CLI subcommands against test data
    deps: [build]
    cmds:
      - echo "=== parse ===" && bin/ptaf parse testdata/simple.beancount
      - echo "=== highlight ===" && bin/ptaf highlight testdata/simple.beancount
      - echo "=== check ===" && bin/ptaf checkD testdata/simple.beancount

  docs:build:
    desc: Generate multi-page HTML docs (index + per-format pages)
    preconditions:
      - sh: which tree-sitter2abnf
        msg: "tree-sitter2abnf not found — go install github.com/drummonds/tree-sitter2abnf@latest"
      - sh: which pta2svg
        msg: "pta2svg not found — go install github.com/drummonds/pta2svg@latest"
      - sh: test -d ../tree-sitter-beancount
        msg: "missing ../tree-sitter-beancount — git clone https://github.com/polarmutex/tree-sitter-beancount"
      - sh: test -d ../tree-sitter-goluca
        msg: "missing ../tree-sitter-goluca"
      - sh: test -d ../tree-sitter-pta
        msg: "missing ../tree-sitter-pta"
    cmds:
      - task-plus md2html --project "{{.PROJECT}}" --file docs/index.md --dst docs
      - task-plus md2html --project "{{.PROJECT}}" --file docs/goluca.md --dst docs
      - task-plus md2html --project "{{.PROJECT}}" --file README.md --dst docs
      - task-plus md2html --project "{{.PROJECT}}" --file ROADMAP.md --dst docs
      - task-plus md2html --project "{{.PROJECT}}" --src docs/internal --dst docs/internal
      - go run ./cmd/docs

